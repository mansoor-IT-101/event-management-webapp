<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Horizon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">Event<span>Horizon</span></div>
    <div class="header-badge">Management Portal</div>
  </header>

  <!--  MAIN  -->
  <main>

    <!-- SEARCH BAR -->
    <div class="search-wrap">
      <label for="searchBar">Search Events</label>
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchBar" placeholder="Search by name or date…" autocomplete="off" />
    </div>

    <!-- EVENT LIST -->
    <section class="events-section">
      <h2 class="section-title">
        Upcoming Events
        <span class="pill" id="countPill">0</span>
      </h2>
      <div id="eventList"></div>
      <div id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        <p>No events found. Add one using the form!</p>
      </div>
    </section>

    <!-- ADD EVENT FORM -->
    <aside class="form-section">
      <div class="form-card">
        <h2>Add New Event</h2>

        <!-- Warning message -->
        <div id="warning"></div>

        <div class="field">
          <label for="eventName">Event Name</label>
          <input type="text" id="eventName" placeholder="e.g. Tech Summit 2025" />
        </div>

        <div class="field">
          <label for="eventDate">Event Date</label>
          <input type="date" id="eventDate" />
        </div>

        <div class="field">
          <label for="eventDesc">Description</label>
          <textarea id="eventDesc" placeholder="Brief description of the event…"></textarea>
        </div>

        <button class="btn-add" id="addBtn">+ Add Event</button>
      </div>
    </aside>

  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-brand">EventHorizon</span>
    <p>Built by <strong>Mansoor</strong> &mdash; &copy; <span id="year"></span></p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
